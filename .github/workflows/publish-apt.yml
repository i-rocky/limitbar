name: Publish apt repo

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install apt tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils

      - name: Import signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${APT_GPG_PRIVATE_KEY}" ]]; then
            echo "APT_GPG_PRIVATE_KEY secret is not set" >&2
            exit 1
          fi
          echo "${APT_GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "CLOUDFLARE_API_TOKEN secret is not set" >&2
            exit 1
          fi
          bash scripts/publish-apt.sh
