name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch_name: x86_64
            ext: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os_name: linux
            arch_name: aarch64
            ext: ""
          - runner: macos-latest
            target: x86_64-apple-darwin
            os_name: darwin
            arch_name: x86_64
            ext: ""
          - runner: macos-latest
            target: aarch64-apple-darwin
            os_name: darwin
            arch_name: aarch64
            ext: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch_name: x86_64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev

      - name: Build and package (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          OS_NAME: ${{ matrix.os_name }}
          ARCH_NAME: ${{ matrix.arch_name }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME}"
          BASENAME="limitbar-${OS_NAME}-${ARCH_NAME}-${VERSION}"

          mkdir -p dist
          cargo build --release --locked --features overlay --target "${TARGET}"
          cp "target/${TARGET}/release/limitbar" dist/limitbar
          tar -C dist -czf "${BASENAME}.tar.gz" limitbar

      - name: Build and package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          OS_NAME: ${{ matrix.os_name }}
          ARCH_NAME: ${{ matrix.arch_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:GITHUB_REF_NAME
          $basename = "limitbar-$($env:OS_NAME)-$($env:ARCH_NAME)-$version"

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          cargo build --release --locked --features overlay --target $env:TARGET
          Copy-Item "target/$($env:TARGET)/release/limitbar.exe" "dist/limitbar.exe" -Force

          Compress-Archive -Path "dist/limitbar.exe" -DestinationPath "$basename.zip" -Force

      - name: Build deb package (linux)
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-deb --locked
          cargo deb --no-build --target "${{ matrix.target }}"
          cp target/${{ matrix.target }}/debian/*.deb .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: limitbar-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: |
            limitbar-*.zip
            limitbar-*.tar.gz
            limitbar_*.deb
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.deb" \) -exec cp {} dist/ \;
          (
            cd dist
            find . -maxdepth 1 -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.deb" \) -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.deb
            dist/SHA256SUMS.txt
